<!DOCTYPE html>
<html>
<head>

<title>US Tax Calculator</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
padding:25px;
max-width:500px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#2e7dff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
background:#f1f1f1;
padding:15px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>US Tax Calculator</h2>

<label>Income</label>
<input type="number" id="income" value="0">

<label>Filing Status</label>

<select id="status">
<option value="single">Single</option>
<option value="married">Married Filing Jointly</option>
<option value="hoh">Head of Household</option>
</select>

<label>State</label>

<select id="state">

<option value="FL">Florida</option>
<option value="TX">Texas</option>
<option value="CA">California</option>
<option value="NY">New York</option>
<option value="NJ">New Jersey</option>
<option value="PA">Pennsylvania</option>
<option value="IL">Illinois</option>
<option value="GA">Georgia</option>
<option value="NC">North Carolina</option>
<option value="SC">South Carolina</option>
<option value="VA">Virginia</option>
<option value="MD">Maryland</option>
<option value="MA">Massachusetts</option>
<option value="CT">Connecticut</option>
<option value="CO">Colorado</option>
<option value="AZ">Arizona</option>
<option value="MI">Michigan</option>
<option value="WI">Wisconsin</option>
<option value="MN">Minnesota</option>
<option value="MO">Missouri</option>
<option value="IN">Indiana</option>
<option value="OH">Ohio</option>
<option value="KY">Kentucky</option>
<option value="TN">Tennessee</option>
<option value="AL">Alabama</option>
<option value="MS">Mississippi</option>
<option value="LA">Louisiana</option>
<option value="OK">Oklahoma</option>
<option value="AR">Arkansas</option>
<option value="KS">Kansas</option>
<option value="IA">Iowa</option>
<option value="NE">Nebraska</option>
<option value="SD">South Dakota</option>
<option value="ND">North Dakota</option>
<option value="MT">Montana</option>
<option value="WY">Wyoming</option>
<option value="ID">Idaho</option>
<option value="UT">Utah</option>
<option value="NV">Nevada</option>
<option value="WA">Washington</option>
<option value="OR">Oregon</option>
<option value="AK">Alaska</option>
<option value="HI">Hawaii</option>
<option value="ME">Maine</option>
<option value="NH">New Hampshire</option>
<option value="VT">Vermont</option>
<option value="RI">Rhode Island</option>
<option value="DE">Delaware</option>
<option value="DC">District of Columbia</option>

</select>

<button onclick="calculate()">Calculate Taxes</button>

<div class="result">

<p><strong>Federal Tax:</strong> <span id="federalTax">$0</span></p>

<p><strong>State Tax:</strong> <span id="stateTax">$0</span></p>

<p><strong>Total Tax:</strong> <span id="totalTax">$0</span></p>

</div>

</div>

<script>

const STATE_TAX_RATES = {

FL:0,
TX:0,
NV:0,
WA:0,
WY:0,
SD:0,
AK:0,
TN:0,

CA:0.09,
NY:0.08,
NJ:0.06,
PA:0.0307,
IL:0.0495,
GA:0.0575,
NC:0.0475,
SC:0.06,
VA:0.0575,
MD:0.0575,
MA:0.05,
CT:0.05,
CO:0.045,
AZ:0.045,
MI:0.0425,
WI:0.05,
MN:0.07,
MO:0.054,
IN:0.0323,
OH:0.0399,
KY:0.045,
AL:0.05,
MS:0.05,
LA:0.05,
OK:0.05,
AR:0.055,
KS:0.052,
IA:0.057,
NE:0.055,
ND:0.025,
MT:0.0675,
ID:0.058,
UT:0.0485,
OR:0.09,
HI:0.08,
ME:0.0715,
VT:0.065,
RI:0.0575,
DE:0.066,
DC:0.065

};

function calculate(){

let income = parseFloat(document.getElementById("income").value) || 0;

let federalTax = 0;

if(income <= 11600){

federalTax = income * 0.10;

}else if(income <= 47150){

federalTax = 1160 + (income - 11600) * 0.12;

}else{

federalTax = 5426 + (income - 47150) * 0.22;

}

let state = document.getElementById("state").value;

let stateRate = STATE_TAX_RATES[state] || 0;

let stateTax = income * stateRate;

let totalTax = federalTax + stateTax;

document.getElementById("federalTax").innerText = "$" + federalTax.toFixed(2);

document.getElementById("stateTax").innerText = "$" + stateTax.toFixed(2);

document.getElementById("totalTax").innerText = "$" + totalTax.toFixed(2);

}

</script>

</body>
</html>
