<!DOCTYPE html>
<html>
<head>
<title>US Income Tax Calculator</title>
<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
padding:25px;
max-width:500px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#2e7dff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
background:#f1f1f1;
padding:15px;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>US Tax Calculator</h2>

<label>Total Income ($)</label>
<input type="number" id="income" placeholder="Enter total income">

<label>Type of Income</label>
<select id="incomeType">
<option value="w2">W2 Salary</option>
<option value="self">1099 Self Employment</option>
<option value="trading">1099 Trading (Short Term)</option>
<option value="dividend">1099 Dividends</option>
<option value="interest">1099 Interest</option>
</select>

<label>Filing Status</label>
<select id="status">
<option value="single">Single</option>
<option value="married">Married Filing Jointly</option>
</select>

<button onclick="calculate()">Calculate Taxes</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let income = parseFloat(document.getElementById("income").value);
let type = document.getElementById("incomeType").value;
let status = document.getElementById("status").value;

let standardDeduction = 14600;

if(status=="married"){
standardDeduction = 29200;
}

let taxableIncome = Math.max(0, income - standardDeduction);

let tax = 0;

function federalTax(income){

let tax=0;

if(income<=11600){
tax=income*0.10;
}
else if(income<=47150){
tax=1160+(income-11600)*0.12;
}
else if(income<=100525){
tax=5426+(income-47150)*0.22;
}
else{
tax=17168+(income-100525)*0.24;
}

return tax;
}

tax = federalTax(taxableIncome);

let selfEmploymentTax = 0;

if(type=="self"){
selfEmploymentTax = income * 0.153;
}

let totalTax = tax + selfEmploymentTax;

document.getElementById("result").innerHTML=

"Taxable Income: $" + taxableIncome.toFixed(2) + "<br><br>" +

"Federal Income Tax: $" + tax.toFixed(2) + "<br><br>" +

"Self Employment Tax: $" + selfEmploymentTax.toFixed(2) + "<br><br>" +

"<b>Total Estimated Tax: $" + totalTax.toFixed(2) + "</b>";

}

</script>

</body>
</html>
